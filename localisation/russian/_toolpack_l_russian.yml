 ### EVENTS ###
 #CPT
 toolpack.1.t:0 "Помощь"
 toolpack.1.d:0 "Запутались? Позвольте объяснить, как пользоваться инструментом установления марионеток.\n\nЭтот инструмент содержит два окна: окно «Инструмент», где находятся основные функции, и окно «Галерея», в котором представлен обзор всех возможных уровней автономии. Наведите курсор на любой из них, чтобы увидеть необходимые условия.\n\nТеперь перейдём к самому инструменту. Как уже упоминалось, большинство уровней автономии требуют выполнения определённых условий. Чтобы не запутаться, в списке отображаются только доступные вам на данный момент варианты. Так что не волнуйтесь, если у Германии будут одни опции, а у Японии — другие.\n\nЧтобы использовать инструмент, сначала щёлкните по области страны, которую вы хотите сделать марионеткой. Нажмите кнопку пометки, чтобы выделить её, затем щёлкните по области страны, которая должна стать сюзереном. После этого выберите один из доступных вариантов уровня автономии.\n\nКнопку «Освободить страну» можно использовать как для освобождения всех отмеченных стран, так и той, по области которой вы кликнули.\n\n\nЕсли вы хотите помочь разработке и заметили какие-либо ошибки (перекрытие интерфейса, отсутствие опций или несоответствие результата выбранному варианту), пожалуйста, сообщите об этом в разделе «Ошибки и проблемы» на странице воркшопа.\n\nВ любом случае — приятного использования Toolpack!"
 toolpack.1.a:0 "Понятно"

 
 #DST
 toolpack.2.d:0 "Хочешь узнать, как работает этот инструмент? Вот краткое руководство по DST A.\n\nСначала отметьте флажки тех типов дивизий, которые вы хотите создать. Отметьте «Пехота» для пехотных дивизий, «Кавалерия» — для кавалерийских и т.д. Можно выбрать сразу несколько типов, чтобы создать дивизии разных видов одновременно.\n\nДалее выберите одно из восьми значений под надписью «Батальонов в дивизии». Например, выбрав «16», вы создадите дивизии с 16 батальонами каждая. Можно выбрать только одно значение.\n\nТеперь выберите область, в которой хотите разместить дивизии. Отметив страны, вы сможете создавать дивизии от разных стран в одной и той же области. Если ничего не отмечено, дивизии будут принадлежать стране-владельцу региона. Не отмечайте несколько стран при размещении дивизий в области, не контролируемой владельцем, и не пытайтесь создавать слишком много дивизий сразу — это сильно нагрузит игру.\n\nНаконец, нажмите одну из четырёх кнопок под надписью «Создать дивизии:», чтобы создать выбранные дивизии.\n\nС помощью кнопки «Удалить» в правом нижнем углу можно удалить все дивизии указанного типа у выбранной страны."
 toolpack.2.a:0 "Понятно"
 toolpack.3.d:0 "Запутались? Вот краткое руководство по DST B.\n\nСначала выберите область, в которой хотите создать дивизии.\n\nЗатем нажмите кнопку «Создать шаблон» до трёх раз — появятся ячейки T1, T2 и T3, каждая из которых представляет отдельный шаблон. T1 соответствует «Toolpack-дивизия», T2 — «Toolpack-дивизия 2» и так далее. Следующий шаг — отредактировать шаблон страны, которая должна получить дивизию. Чтобы переключиться на другую страну, используйте команду: `tag [тег нужной страны]`. Список всех тегов можно найти здесь: `C:/Program Files (x86)/Steam/steamapps/common/Hearts of Iron IV/common/country_tags/00_countries`. Используйте две зелёные звёздочки, чтобы добавить или убрать опыт армии.\n\nТеперь можно указать, насколько хорошо оснащёнными и опытными должны быть дивизии.\n\nПредпоследний шаг — выбрать шаблон(ы), которые вы хотите использовать. Отметьте T1, T2, T3 — один, два или все сразу.\n\nНаконец, нажмите любую из четырёх кнопок под надписью «Создать дивизии:», чтобы произвести нужное количество дивизий. Помните, вы не можете создавать пользовательские дивизии своей страны в других странах.\n\nНажмите кнопку «Удалить» в нижнем правом углу, предварительно установив галочки, чтобы удалить все пользовательские дивизии у выбранной страны.\n\nЧто нельзя сделать с этим инструментом:\n- Редактировать шаблон в одной стране и использовать его в другой\n- Создавать переименованные шаблоны"


 #SST
 toolpack.4.d:0 "Вот как работает «Инструмент создания кораблей»:\n\nШаг 1: Выберите типы кораблей, которые хотите создать.\n\nШаг 2: Кликните по области, принадлежащей стране, которая должна получить корабли.\n\nШаг 3: Нажмите одну из четырёх кнопок, чтобы создать нужное количество кораблей."
 
#MST
 toolpack.5.t:0 "Инструмент Управления Населением"
 toolpack.5.d:0 "Инструмент MPT состоит из двух схожих по функционалу инструментов. Первый — это MMT, предназначенный для изменения людских ресурсов стран. Выберите опцию «Страна», чтобы напрямую добавить или убрать людские ресурсы, либо сначала измените одну из двух переменных, чтобы затем прибавить её значение к выбранным странам как людские ресурсы.\nС помощью PMT вы можете управлять населением выбранных регионов — снова, либо напрямую, либо изменяя переменные заранее.\n\nПроблемы, с которыми вы столкнётесь: четыре переменные, редактируемые в этом инструменте, не могут превышать значения 2147k или -2147k. Это потому, что при превышении 2.147 млн значение переменной превращается в отрицательное. Именно поэтому численность населения некоторых стран или регионов выглядит сломанной. В этом виновата Paradox."

