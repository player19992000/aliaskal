 CPT_INT_PUP_ETT:0 "§HИнтегрированная марионетка§! требует: \"Together for Victory\" и нефашистское правительство, если активирована \"Death or Dishonor\".\nУровень автономии между §H0-1000§W £autonomy_texticon§"
 CPT_PUP_ETT:0 "§HМарионетка§! не требует ничего. Если активированы \"Together for Victory\" и \"Death or Dishonor\":\nУровень автономии между §H1000-2000§W £autonomy_texticon§"
 CPT_COL_ETT:0 "§HКолония§! требует: \"Together for Victory\" и нефашистское правительство, если активирована \"Death or Dishonor\".\nУровень автономии между §H2000-3000§W £autonomy_texticon§"
 CPT_DOM_ETT:0 "§HДоминион§! требует: \"Together for Victory\" и нефашистское правительство, если активирована \"Death or Dishonor\".\nУровень автономии между §H3000-4000§W £autonomy_texticon§"
 CPT_RKM_ETT:0 "§HРейхскомиссариат§! требует: \"Death or Dishonor\". Япония и Маньчжоу-го не могут быть сюзеренами, если активирована \"Waking the Tiger\".\nУровень автономии между §H0-1600§W £autonomy_texticon§"
 CPT_RPT_ETT:0 "§HРейхспротекторат§! требует: \"Death or Dishonor\". Япония и Маньчжоу-го не могут быть сюзеренами, если активирована \"Waking the Tiger\".\nУровень автономии между §H1600-3200§W £autonomy_texticon§"
 CPT_SAT_ETT:0 "§HСателлит§! требует: \"Death or Dishonor\". Япония и Маньчжоу-го не могут быть сюзеренами, если активирована \"Waking the Tiger\".\nУровень автономии между §H3200-4000§W £autonomy_texticon§"
 CPT_IPP_ETT:0 "§HИмперский протекторат§! требует: \"Waking the Tiger\". Марионетка должна иметь либо фашистскую Японию, либо нейтральную/фашистскую Маньчжоу-го как сюзерена.\nУровень автономии между §H0-2400§W £autonomy_texticon§"
 CPT_IPA_ETT:0 "§HИмперский союзник§! требует: \"Waking the Tiger\". Марионетка должна иметь либо фашистскую Японию, либо нейтральную/фашистскую Маньчжоу-го как сюзерена.\nУровень автономии между §H2400-4000§W £autonomy_texticon§ или между §H2400-3000§W £autonomy_texticon§, если Маньчжоу-го — марионетка Японии и завершила фокус \"Assertiveness\"."
 CPT_IPS_ETT:0 "§HИмперский подданный§! требует: \"Waking the Tiger\". Маньчжоу-го должна иметь фашистскую Японию как сюзерена.\nУровень автономии между §H3000-4000§W £autonomy_texticon§"
