l_russian:
 
 CPT_COUNTRY_NAME:0 "§Y[From.Owner.GetName]§!"
 CPT_ACTIVITY_ON:0 "Инструмент управления марионетками: £trigger_no"
 CPT_ACTIVITY_OFF:0 "Инструмент управления марионетками: £trigger_yes"
 cpt.1.t:0 "Помощь"
 cpt.1.d:0 "Запутались? Позвольте объяснить шаги, необходимые для освоения Инструмента управления марионетками.\n\nЭтот инструмент содержит два окна: окно \"Инструмент\", где находится сам инструмент, и окно \"Галерея\", которое показывает обзор всех возможных уровней автономии. Наведите курсор на них, чтобы увидеть необходимые требования.\n\nТеперь об инструменте. Как уже было сказано, для большинства уровней автономии требуются определённые условия. Чтобы не путаться, вы будете видеть только доступные варианты автономии. Так что не беспокойтесь, если у Германии и Японии разные варианты.\n\nДля использования инструмента сначала кликните по провинции страны, которую хотите сделать марионеткой. Используйте кнопку пометки, чтобы отметить её, затем кликните по провинции страны, которая станет сюзереном. Наконец, выберите один из вариантов, чтобы установить отмеченной стране уровень автономии.\n\nКнопка \"Свободная страна\" может использоваться для освобождения всех отмеченных стран или страны, провинцию которой вы кликнули.\n\nЕсли хотите помочь и заметили проблемы (перекрытия, отсутствие вариантов или результаты не соответствуют выбранным опциям), пожалуйста, сообщите о них в разделе \"Ошибки и проблемы\" на воркшопе.\n\nВ любом случае, приятного использования CPT."
